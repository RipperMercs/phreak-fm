name = "phreak-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[triggers]
crons = ["*/30 * * * *"]

[[kv_namespaces]]
binding = "FEED_KV"
id = "PLACEHOLDER_REPLACE_WITH_REAL_ID"
preview_id = "PLACEHOLDER_REPLACE_WITH_REAL_ID"

[[kv_namespaces]]
binding = "CONTENT_KV"
id = "PLACEHOLDER_REPLACE_WITH_REAL_ID"
preview_id = "PLACEHOLDER_REPLACE_WITH_REAL_ID"

[[r2_buckets]]
binding = "AUDIO_R2"
bucket_name = "phreak-audio"

[[r2_buckets]]
binding = "MEDIA_R2"
bucket_name = "phreak-media"

[vars]
ENVIRONMENT = "production"
